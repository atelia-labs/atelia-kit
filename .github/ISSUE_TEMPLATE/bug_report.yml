name: Bug report
description: Report a problem in Atelia Kit.
title: "[Bug]: "
labels: ["type: bug", "needs: triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: context
    attributes:
      label: Context

